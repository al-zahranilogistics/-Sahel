    // Helper
    function showToast(msg, duration = 3000) { let t = document.createElement("div"); t.className = "toast-msg"; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), duration); }
    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m=>{ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function getCatDisplay(catId) { let c = PROVIDER_CATEGORIES.find(c=>c.id===catId); if(!c) return catId; return currentLanguage==="ar"? c.arName : c.enName; }
    function applyLanguageDirection() { let html = document.documentElement; let isAr = currentLanguage === "ar"; html.setAttribute("dir", isAr ? "rtl" : "ltr"); html.setAttribute("lang", isAr ? "ar" : "en"); document.getElementById("langToggleText").innerText = isAr ? "English" : "العربية"; localStorage.setItem("sahel_lang", currentLanguage); }

    // ========== FIREBASE AUTH & DATA ==========
    async function ensureAdmin() {
        const adminEmail = "admin@sahel.com";
        const adminPassword = "123321";
        const adminUsername = "هوندا";
        try {
            // Try to sign in
            await auth.signInWithEmailAndPassword(adminEmail, adminPassword);
            await auth.signOut();
        } catch (e) {
            if (e.code === 'auth/user-not-found') {
                try {
                    // Create user
                    const userCred = await auth.createUserWithEmailAndPassword(adminEmail, adminPassword);
                    const user = userCred.user;
                    await user.updateProfile({ displayName: adminUsername });
                    await db.collection("users").doc(user.uid).set({
                        uid: user.uid,
                        email: adminEmail,
                        username: adminUsername,
                        role: "admin",
                        logo: "",
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await auth.signOut();
                    console.log("Admin user created successfully");
                } catch (createErr) {
                    console.error("Error creating admin:", createErr);
                    showToast("⚠️ لم يتم إنشاء حساب المسؤول تلقائياً. تأكد من تفعيل Email/Password في Firebase Console.", 5000);
                }
            } else if (e.code === 'auth/operation-not-allowed') {
                showToast("❌ خطأ: طريقة تسجيل الدخول (Email/Password) غير مفعلة. الرجاء تفعيلها في Firebase Console.", 6000);
            } else {
                console.error("Admin check error:", e);
            }
        }
    }

    async function registerUser(email, username, password, role, logoFile) {
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCred.user;
            await user.updateProfile({ displayName: username });
            let logoUrl = "";
            if (logoFile) {
                const storageRef = storage.ref(`logos/${user.uid}`);
                await storageRef.put(logoFile);
                logoUrl = await storageRef.getDownloadURL();
            }
            await db.collection("users").doc(user.uid).set({
                uid: user.uid,
                email: email,
                username: username,
                role: role,
                logo: logoUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            return { success: true };
        } catch (err) {
            console.error(err);
            let message = err.message;
            if (err.code === 'auth/email-already-in-use') message = "البريد الإلكتروني مستخدم بالفعل";
            else if (err.code === 'auth/weak-password') message = "كلمة المرور ضعيفة (6 أحرف على الأقل)";
            else if (err.code === 'auth/operation-not-allowed') message = "طريقة تسجيل الدخول غير مفعلة. راجع Firebase Console.";
            return { success: false, message };
        }
    }

    async function loginUser(identifier, password) {
        try {
            let email = identifier;
            // If identifier is not an email, search for username in Firestore
            if (!identifier.includes('@')) {
                const snapshot = await db.collection("users").where("username", "==", identifier).get();
                if (snapshot.empty) throw new Error("اسم المستخدم غير موجود");
                email = snapshot.docs[0].data().email;
            }
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            const user = userCred.user;
            const doc = await db.collection("users").doc(user.uid).get();
            if (!doc.exists) throw new Error("بيانات المستخدم غير مكتملة");
            return { success: true, userData: doc.data() };
        } catch (err) {
            console.error(err);
            let message = err.message;
            if (err.code === 'auth/user-not-found') message = "المستخدم غير موجود";
            else if (err.code === 'auth/wrong-password') message = "كلمة المرور غير صحيحة";
            else if (err.code === 'auth/invalid-credential') message = "بيانات الدخول غير صحيحة. تأكد من اسم المستخدم/البريد وكلمة المرور.";
            else if (err.code === 'auth/operation-not-allowed') message = "طريقة تسجيل الدخول غير مفعلة. راجع Firebase Console.";
            return { success: false, message };
        }
    }

    // Service functions
    async function addService(name, phone, categoryId, price, location, imageFile) {
        if (!name.trim() || !phone.trim() || !location.trim()) return false;
        let imageUrl = "";
        if (imageFile) {
            const ref = storage.ref(`services/${Date.now()}_${imageFile.name}`);
            await ref.put(imageFile);
            imageUrl = await ref.getDownloadURL();
        }
        await db.collection("services").add({
            name: name.trim(), phone: phone.trim(), categoryId, price: price || "", location: location.trim(),
            image: imageUrl, providerId: currentUser.uid, status: "pending",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return true;
    }
    async function approveService(serviceId) { await db.collection("services").doc(serviceId).update({ status: "approved" }); }
    async function rejectService(serviceId) { await db.collection("services").doc(serviceId).delete(); }
    async function deleteService(serviceId, isAdmin = false) {
        const doc = await db.collection("services").doc(serviceId).get();
        if (!doc.exists) return false;
        if (!isAdmin && doc.data().providerId !== currentUser.uid) return false;
        await db.collection("services").doc(serviceId).delete();
        return true;
    }
    async function getServicesForClient(filterCat = "all") {
        const snap = await db.collection("services").where("status", "==", "approved").get();
        let services = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (filterCat === "all") return services;
        if (filterCat === "مطاعم") return services.filter(s => FOOD_SUBCATEGORIES.includes(s.categoryId));
        return services.filter(s => s.categoryId === filterCat);
    }
    async function getProviderServices(uid) {
        const snap = await db.collection("services").where("providerId", "==", uid).get();
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function getPendingServices() {
        const snap = await db.collection("services").where("status", "==", "pending").get();
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function createBooking(serviceId, clientLocation) {
        await db.collection("bookings").add({
            serviceId, clientId: currentUser.uid, clientLocation, status: "pending",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    async function getBookingsForProvider(providerId) {
        const servicesSnap = await db.collection("services").where("providerId", "==", providerId).get();
        const serviceIds = servicesSnap.docs.map(d => d.id);
        if (serviceIds.length === 0) return [];
        const bookingsSnap = await db.collection("bookings").where("serviceId", "in", serviceIds).get();
        return bookingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function confirmBooking(bookingId) { await db.collection("bookings").doc(bookingId).update({ status: "confirmed" }); }
    async function getAllBookingsAdmin() { const snap = await db.collection("bookings").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getAllServicesAdmin() { const snap = await db.collection("services").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }
    async function getAllUsers() { const snap = await db.collection("users").get(); return snap.docs.map(d => ({ id: d.id, ...d.data() })); }

            if (!document.querySelector('.auth-bg')) {
                let bgDiv = document.createElement('div'); bgDiv.className = 'auth-bg'; document.body.appendChild(bgDiv);
                let overlay = document.createElement('div'); overlay.className = 'auth-overlay'; document.body.appendChild(overlay);
            }
            container.innerHTML = renderAuthPage();
            attachAuthEvents();
        } else {
            document.querySelectorAll('.auth-bg, .auth-overlay').forEach(el => el.remove());
            if (currentUser.role === "client") container.innerHTML = await renderClientView();
            else if (currentUser.role === "provider") container.innerHTML = await renderProviderView();
            else container.innerHTML = await renderAdminView();
            attachRoleEvents();
        }
        applyLanguageDirection();
    }

    function attachAuthEvents() {
        document.getElementById("showLoginBtn")?.addEventListener("click", ()=> { document.getElementById("authFormContainer").innerHTML = renderLoginForm(); document.getElementById("doLoginBtn")?.addEventListener("click", async ()=>{ let res = await loginUser(document.getElementById("loginIdentifier").value, document.getElementById("loginPass").value); if(res.success) { currentUser = res.userData; renderApp(); showToast("✓ "+ (currentLanguage==="ar"?"تم الدخول":"Logged in")); } else showToast(res.message); }); });
        document.getElementById("showRegisterBtn")?.addEventListener("click", ()=> { document.getElementById("authFormContainer").innerHTML = renderRegisterForm(); const logoInput = document.getElementById("regLogo"); if(logoInput) logoInput.addEventListener("change", (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = function(ev) { document.getElementById("logoPreviewImg").src = ev.target.result; document.getElementById("logoPreviewImg").style.display = "block"; }; reader.readAsDataURL(file); } }); document.getElementById("doRegisterBtn")?.addEventListener("click", async ()=>{ let email = document.getElementById("regEmail").value, username = document.getElementById("regUsername").value, pass = document.getElementById("regPass").value, role = document.getElementById("regRole").value, logoFile = document.getElementById("regLogo")?.files[0]; const result = await registerUser(email, username, pass, role, logoFile); if(result.success) { showToast(currentLanguage==="ar"?"تم إنشاء الحساب، سجل دخول":"Account created, please login"); document.getElementById("showLoginBtn").click(); } else showToast(result.message); }); });
        document.getElementById("authFormContainer").innerHTML = renderLoginForm();
        document.getElementById("doLoginBtn")?.addEventListener("click", async ()=>{ let res = await loginUser(document.getElementById("loginIdentifier").value, document.getElementById("loginPass").value); if(res.success) { currentUser = res.userData; renderApp(); showToast("✓ "+ (currentLanguage==="ar"?"تم الدخول":"Logged in")); } else showToast(res.message); });
    }

    function attachRoleEvents() {
        // Simplified for brevity - full code in original
    }

    // ======================== START ========================
    ensureAdmin();
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) currentUser = doc.data();
            else currentUser = null;
        } else {
            currentUser = null;
        }
        renderApp();
    });
    document.getElementById("langToggleBtn")?.addEventListener("click", ()=>{ currentLanguage = currentLanguage === "ar" ? "en" : "ar"; applyLanguageDirection(); renderApp(); });
    document.getElementById("logoutBtn")?.addEventListener("click", async ()=>{ await logoutUser(); renderApp(); });
</script>
</body>
</html>
